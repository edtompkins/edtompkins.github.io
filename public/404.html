<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found | Ed Tompkins</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/assets/favicon-32.png" sizes="32x32" type="image/png" />
  <style>
    @font-face {
      font-family: 'GT Sectra Display';
      src: url('/assets/fonts/GT-Sectra-Display-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'GT Sectra';
      src: url('/assets/fonts/GT-Sectra-Book.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F6F3ED;
      color: #14181F;
      font-family: 'GT Sectra', Georgia, serif;
      padding: 24px;
    }
    main { max-width: 34rem; text-align: center; }
    .label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #626A7A;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'GT Sectra Display', Georgia, serif;
      font-weight: 400;
      color: #1B2A41;
      font-size: 64px;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }
    .rule {
      width: 48px;
      height: 2px;
      background: #C4712B;
      margin: 24px auto;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: #14181F;
      margin-bottom: 32px;
    }
    a.home {
      color: #C4712B;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
    }
    a.home:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <p class="label">404 — Page not found</p>
    <h1>This page has stalled.</h1>
    <div class="rule"></div>
    <p>The page you were looking for isn't here. It may have moved, or the link was mistyped.</p>
    <a class="home" href="/">Back to home →</a>
  </main>
</body>
</html>
